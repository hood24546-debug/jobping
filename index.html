<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobPing</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  background: rgba(0,0,0,0.4);
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  margin-top: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00c853, #00e676);
  color: white;
  font-weight: bold;
}

.job {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

.featured {
  border: 2px solid gold;
}

a {
  color: #00e676;
  display: inline-block;
  margin-top: 8px;
}

footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>⚡ JobPing</header>

<div class="container">

<div class="card">
  <h3>Post a Job</h3>
  <input id="title" placeholder="Job title">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="location" placeholder="Location">
  <input id="pay" placeholder="Pay">
  <input id="contact" placeholder="WhatsApp (267...)">

  <label>
    <input type="checkbox" id="featured">
    🔥 Featured
  </label>

  <button onclick="addJob()">Post Job</button>
</div>

<div class="card">
  <h3>Live Jobs</h3>
  <div id="jobs"></div>
</div>

</div>

<footer>
Made by Kyrie Chirombedzi
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9qx8fcTPDKUUjn-jhPNJEvEWrSFPAPl0",
  authDomain: "jobping-21275.firebaseapp.com",
  projectId: "jobping-21275",
  storageBucket: "jobping-21275.appspot.com",
  messagingSenderId: "440579832823",
  appId: "1:440579832823:web:e6428a7a16179acbd74cf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// POST JOB
window.addJob = async () => {
  await addDoc(collection(db, "jobs"), {
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value,
    location: document.getElementById("location").value,
    pay: document.getElementById("pay").value,
    contact: document.getElementById("contact").value,
    featured: document.getElementById("featured").checked,
    createdAt: Date.now()
  });

  alert("Job posted!");
};

// LIVE JOBS
onSnapshot(collection(db, "jobs"), (snapshot) => {
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  snapshot.forEach((doc) => {
    const job = doc.data();

    container.innerHTML += `
      <div class="job ${job.featured ? 'featured' : ''}">
        <h3>${job.featured ? "🔥 " : ""}${job.title}</h3>
        <p>${job.desc}</p>
        <p>📍 ${job.location}</p>
        <p>💰 ${job.pay}</p>

        <a href="https://wa.me/${job.contact}" target="_blank">
          💬 Chat on WhatsApp
        </a>
      </div>
    `;
  });
});
</script>

</body>
</html>
